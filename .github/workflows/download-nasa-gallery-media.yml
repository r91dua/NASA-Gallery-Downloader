name: Download NASA Gallery Media

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Download NASA gallery media into repo folder
        run: |
          python download_nasa_galleries.py \
            --galleries-file galleries.txt \
            --output nasa_downloads \
            --max-pages 10 \
            --sleep 0.25

      - name: Show downloaded files
        run: |
          echo "Downloaded file count:"
          find nasa_downloads -type f | wc -l

          echo ""
          echo "Folder sizes:"
          du -h -d 2 nasa_downloads || true

          echo ""
          echo "Download manifest:"
          cat nasa_downloads/_download_manifest.json || true

      - name: Commit downloaded media back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add nasa_downloads/

          if git diff --cached --quiet; then
            echo "No new media changes to commit."
          else
            git commit -m "Add NASA gallery media"
            git push
          fi
