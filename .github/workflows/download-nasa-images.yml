name: Download NASA Lunar Flyby Images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Download NASA images into repo folder
        run: |
          python download_from_ids.py \
            --ids-file nasa_ids.txt \
            --output lunar_flyby_images

      - name: Show downloaded files
        run: |
          ls -lah lunar_flyby_images
          find lunar_flyby_images -type f | wc -l

      - name: Commit downloaded images back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add lunar_flyby_images/

          if git diff --cached --quiet; then
            echo "No new image changes to commit."
          else
            git commit -m "Add NASA lunar flyby images"
            git push
          fi
